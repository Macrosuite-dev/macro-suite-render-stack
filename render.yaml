databases:
  - name: macro-suite-license-db
    plan: free
    databaseName: macro_suite_license
    user: macro_suite_license

services:
  - type: web
    name: macro-suite-license-api
    runtime: docker
    plan: free
    dockerfilePath: ./services/license_api/Dockerfile
    dockerContext: ./services/license_api
    healthCheckPath: /health
    envVars:
      - key: API_ENVIRONMENT
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: macro-suite-license-db
          property: connectionString
      - key: PUBLIC_BASE_URL
        value: https://macro-suite-license-api.onrender.com
      - key: DASHBOARD_BASE_URL
        value: https://macro-suite-license-admin.onrender.com
      - key: ACTIVATION_TOKEN_ISSUER
        value: macro-suite-license
      - key: ACTIVATION_TOKEN_TTL_MINUTES
        value: "30"
      - key: HEARTBEAT_INTERVAL_SECONDS
        value: "15"
      - key: REQUIRE_CLIENT_SIGNATURES
        value: "false"
      - key: CLIENT_SIGNATURE_TTL_SECONDS
        value: "120"
      - key: ADMIN_API_TOKEN
        sync: false
      - key: LICENSE_KEY_SECRET
        sync: false
      - key: ACTIVATION_TOKEN_SECRET
        sync: false

  - type: web
    name: macro-suite-license-admin
    runtime: docker
    plan: free
    dockerfilePath: ./services/admin_dashboard/Dockerfile
    dockerContext: ./services/admin_dashboard
    healthCheckPath: /health
    envVars:
      - key: DASHBOARD_APP_NAME
        value: Macro Suite Admin Dashboard
      - key: DASHBOARD_ENVIRONMENT
        value: production
      - key: DASHBOARD_PUBLIC_BASE_URL
        value: https://macro-suite-license-admin.onrender.com
      - key: DASHBOARD_ADMIN_USERNAME
        value: admin
      - key: LICENSE_API_BASE_URL
        value: https://macro-suite-license-api.onrender.com
      - key: ADMIN_API_TOKEN
        sync: false
      - key: DASHBOARD_ADMIN_PASSWORD
        sync: false
      - key: DASHBOARD_SESSION_SECRET
        sync: false
